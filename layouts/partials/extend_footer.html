<script>
// Gallery: enable medium-zoom on gallery images
(function() {
  if (typeof mediumZoom !== 'undefined' && document.querySelector('.gallery-masonry')) {
    mediumZoom('.gallery-item img', { background: 'rgba(0,0,0,0.9)' });
  }
})();

// About page: scroll-triggered fade-in animations
(function() {
  if (!document.querySelector('.about-page')) return;
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.about-content h2, .about-content h3').forEach(function(el) {
    el.classList.add('fade-in');
    observer.observe(el);
  });
})();
</script>
