{{- define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{- if .Description }}
  <div class="post-description">
    {{ .Description | markdownify }}
  </div>
  {{- end }}
</header>

{{- if .Params.photos }}
<div class="gallery-masonry" id="gallery">
  {{- range .Params.photos }}
  <div class="gallery-item">
    <img
      loading="lazy"
      src="{{ .src }}"
      alt="{{ .alt }}"
      {{ with .width }}width="{{ . }}"{{ end }}
      {{ with .height }}height="{{ . }}"{{ end }}
      {{ if and .width .height }}style="aspect-ratio: {{ .width }}/{{ .height }};"{{ end }}
    />
    {{- with .alt }}
    <span class="gallery-caption">{{ . }}</span>
    {{- end }}
  </div>
  {{- end }}
</div>
{{- else }}
<div class="post-content">
  {{ .Content }}
</div>
{{- end }}
{{- end }}
