title: Rathtakrit
baseURL: https://rathtakrit.me/
languageCode: en-us
theme: PaperModX

enableRobotsTXT: true
enableEmoji: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  EnableInstantClick: true
  EnableImageZoom: true
  title: Rathtakrit
  description: created by Kritarath
  TocSide: 'right'
  mainSections:
    - blog
    - essays
  keywords:
    - Computer Science
    - Philosophy
    - Blog
    - Portfolio
  author: Kritarath Thipsoonthonsak
  DateFormat: January 2, 2006
  defaultTheme: white
  ShowReadingTime: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  disableScrollToTop: false
  comments: false
  favicon: favicon.ico
  DisableLanguageSwitch: true

  homeInfoParams:
    Title: "🥝 Kiwi, Kritarath Thipsoonthonsak"
    Content: |
      Howdy!👋 I'm an **Industrial Engineering** student at the Hong Kong Polytechnic University, with  dreams of getting into a management role at a tech company. I'll be sharing my life update, cool things I learned—so stay tuned!

      - **Interest:**  computer science, new tech, AI, philosophy, self-improvement, productivity, and life update!
      - **Fun Fact:** I also host a Thai podcast called **[Soundtaste](https://www.youtube.com/@soundtasteder)**. 🎙️

      *To living determingly*

