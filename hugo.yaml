title: Rathtakrit
baseURL: https://rathtakrit.github.io/
languageCode: en-us
theme: PaperModX

enableRobotsTXT: true
enableEmoji: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  EnableInstantClick: true
  EnableImageZoom: true
  title: Rathtakrit
  description: created by Kritarath
  TocSide: 'left'
  mainSections:
    - blog
    - essays
  keywords:
    - Computer Science
    - Philosophy
    - Blog
    - Portfolio
  author: Kritarath Thipsoonthonsak
  DateFormat: January 2, 2006
  defaultTheme: white
  ShowReadingTime: true
  ShowBreadCrumbs: false
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  disableScrollToTop: false
  comments: false
  favicon: favicon.ico
  DisableLanguageSwitch: true

  homeInfoParams:
    Title: "Welcome"
    Content: |
      Howdy!👋 I'm Kiwi, an **Industrial Engineering** student at the Hong Kong Polytechnic University.
      - **Interest:**  Technology, Artificial Intelligence, philosophy, self-improvement.
      - **Opnion Sharing:** I  host a Thai podcast called **[Soundtaste](https://www.youtube.com/@soundtasteder)**, you can come disagree with me there(but you have to know thai tho). 🎙️

      My Favorite quote is:
      *To living determingly*
      *The problem being as good as being able to solve it*

  socialIcons:
    - name: cv
      url: "/cv/2026_Kritarath_Thipsoonthonsal_CV.pdf"
    - name: github-simple
      url: https://github.com/Rathtakrit
    - name: youtube
      url: https://www.youtube.com/@rathtakrit
    - name: linkedin-simple
      url: https://www.linkedin.com/in/kritarath-thipsoonthonsak-a62499256/
    - name: mdi-email
      url: mailto:rathtakrit@gmail.com

